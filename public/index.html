<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nanoSociety — AGI House</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0a0a0a;
        --fg: #33ff33;
        --fg-dim: #1a8a1a;
        --fg-bright: #66ff66;
        --border: #1a5a1a;
        --panel-bg: #0d0d0d;
        --highlight: #ffff00;
        --amber: #ffaa00;
        --cyan: #00ffff;
        --magenta: #ff00ff;
        --red: #ff4444;
        --blue: #4488ff;
        --white: #cccccc;
        --gray: #666666;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: "JetBrains Mono", "Fira Code", "Courier New", monospace;
        font-size: 13px;
        line-height: 1.4;
        height: 100vh;
        overflow: hidden;
      }

      /* CRT scanline overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.08) 2px, rgba(0, 0, 0, 0.08) 4px);
        pointer-events: none;
        z-index: 9999;
      }

      #app {
        display: grid;
        grid-template-columns: 1fr 320px;
        grid-template-rows: auto 1fr 120px;
        height: 100vh;
        gap: 0;
        overflow: hidden;
      }

      /* ── Header ── */
      #header {
        grid-column: 1 / -1;
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--panel-bg);
      }

      #header h1 {
        font-size: 14px;
        font-weight: 700;
        color: var(--fg-bright);
        white-space: nowrap;
      }

      #search-box {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--fg);
        font-family: inherit;
        font-size: 13px;
        padding: 4px 8px;
        width: 240px;
        outline: none;
      }

      #search-box:focus {
        border-color: var(--fg);
      }
      #search-box::placeholder {
        color: var(--fg-dim);
      }

      #status-bar {
        margin-left: auto;
        color: var(--fg-dim);
        white-space: nowrap;
        font-size: 12px;
      }

      #status-bar span {
        margin-left: 12px;
      }
      #status-bar .phase {
        color: var(--amber);
      }
      #status-bar .tick {
        color: var(--fg);
      }

      #progress {
        color: var(--fg-dim);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 360px;
      }

      #progress.active {
        color: var(--amber);
      }

      #progress .spinner {
        display: inline-block;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Main area ── */
      #floor-plan {
        overflow: hidden;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      #sidebar {
        border-left: 1px solid var(--border);
        background: var(--panel-bg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      /* ── Footer log ── */
      #log-panel {
        grid-column: 1 / -1;
        border-top: 1px solid var(--border);
        background: var(--panel-bg);
        padding: 4px 16px;
        height: 120px;
        min-height: 120px;
        max-height: 120px;
        overflow-y: auto;
        font-size: 12px;
      }

      #log-panel .log-entry {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 1px 0;
      }

      #log-panel .log-tag {
        color: var(--fg-dim);
      }

      /* ── Isometric house ── */
      .iso-scene {
        position: relative;
        width: min(100%, 980px);
        aspect-ratio: 1.55;
        min-height: 0;
      }

      .iso-grid {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .iso-grid .wire {
        fill: none;
        stroke: var(--fg);
        stroke-width: 1.6;
        stroke-linejoin: round;
        opacity: 0.92;
        filter: drop-shadow(0 0 6px rgba(51, 255, 51, 0.38));
      }

      .iso-grid .wire.dim {
        opacity: 0.42;
      }

      .iso-grid .face {
        fill: rgba(51, 255, 51, 0.04);
        stroke: rgba(102, 255, 102, 0.18);
        stroke-width: 1;
      }

      .iso-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .iso-people {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .iso-people .person-shadow {
        fill: rgba(0, 0, 0, 0.28);
      }

      .iso-people .person-body {
        fill: color-mix(in srgb, currentColor 18%, transparent);
        stroke: currentColor;
        stroke-width: 1.1;
        stroke-linejoin: round;
      }

      .iso-people .person-head {
        fill: rgba(10, 10, 10, 0.85);
        stroke: currentColor;
        stroke-width: 1.1;
      }

      .iso-people .person-limb {
        stroke: currentColor;
        stroke-width: 1.1;
        stroke-linecap: round;
        fill: none;
      }

      .iso-people .person-ring {
        fill: none;
        stroke: rgba(102, 255, 102, 0.16);
        stroke-width: 1;
      }

      .iso-people .iso-person {
        cursor: pointer;
        filter: drop-shadow(0 0 6px color-mix(in srgb, currentColor 45%, transparent));
      }

      .iso-people .iso-person.solo {
        color: var(--fg-dim);
      }

      .iso-people .iso-person.selected .person-ring {
        stroke: var(--fg);
        stroke-width: 1.8;
      }

      .iso-people .iso-person.highlight .person-ring {
        stroke: var(--highlight);
        stroke-width: 1.6;
      }

      .iso-people .iso-person.selected .person-head,
      .iso-people .iso-person.selected .person-body {
        fill: rgba(51, 255, 51, 0.16);
      }

      .iso-room-panel {
        position: absolute;
        border: 1px solid rgba(51, 255, 51, 0.28);
        background: rgba(10, 16, 10, 0.08);
        box-shadow: inset 0 0 0 1px rgba(102, 255, 102, 0.05), 0 0 16px rgba(51, 255, 51, 0.08);
        padding: 5px 7px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 0;
        min-width: 76px;
        max-width: 128px;
      }

      .iso-room-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }

      .iso-room-name {
        font-size: 10px;
        font-weight: 700;
        color: var(--fg-bright);
        letter-spacing: 0.08em;
      }

      .iso-room-count {
        font-size: 10px;
        color: var(--fg-dim);
        flex-shrink: 0;
      }

      .iso-room-body {
        display: none;
      }

      .iso-room-body::-webkit-scrollbar {
        width: 4px;
      }
      .iso-room-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .iso-room-body::-webkit-scrollbar-thumb {
        background: var(--border);
      }

      .iso-room-body .empty {
        color: var(--fg-dim);
        font-style: italic;
      }

      .team-group {
        margin-bottom: 2px;
      }

      .team-label {
        font-weight: 700;
        font-size: 11px;
      }

      .initials {
        cursor: pointer;
        padding: 0 1px;
      }

      .initials.solo {
        color: var(--fg-dim);
      }

      .initials.highlight {
        background: var(--highlight);
        color: var(--bg);
      }

      .initials.selected {
        background: var(--fg);
        color: var(--bg);
      }

      .iso-room-panel .solo {
        color: var(--fg-dim);
      }

      /* ── Sidebar ── */
      #search-results {
        max-height: 180px;
        overflow-y: auto;
        border-bottom: 1px solid var(--border);
        display: none;
      }

      #search-results.visible {
        display: block;
      }

      .search-item {
        padding: 4px 12px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 12px;
      }

      .search-item .si-room {
        color: var(--fg-dim);
        font-size: 11px;
      }

      #detail-panel {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }

      #detail-panel h2 {
        font-size: 14px;
        color: var(--fg-bright);
        margin-bottom: 8px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
      }

      #detail-panel .empty-detail {
        color: var(--fg-dim);
        padding: 20px 0;
        text-align: center;
        font-size: 12px;
      }

      .detail-section {
        margin-bottom: 12px;
      }

      .detail-section label {
        color: var(--fg-dim);
        font-size: 11px;
        display: block;
        margin-bottom: 2px;
      }

      .detail-section .value {
        font-size: 12px;
        word-wrap: break-word;
      }

      .stat-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 2px 0;
        font-size: 11px;
      }

      .stat-bar .stat-label {
        width: 30px;
        color: var(--fg-dim);
        text-align: right;
      }

      .stat-bar .stat-track {
        flex: 1;
        height: 8px;
        background: #1a1a1a;
        border: 1px solid var(--border);
      }

      .stat-bar .stat-fill {
        height: 100%;
        transition: width 0.3s;
      }

      .stat-bar .stat-val {
        width: 28px;
        text-align: right;
        color: var(--fg);
      }

      .stat-energy .stat-fill {
        background: var(--fg);
      }
      .stat-momentum .stat-fill {
        background: var(--cyan);
      }
      .stat-morale .stat-fill {
        background: var(--amber);
      }

      .detail-log {
        font-size: 11px;
        max-height: 200px;
        overflow-y: auto;
      }

      .detail-log-entry {
        padding: 2px 0;
        border-bottom: 1px solid #111;
        color: var(--fg-dim);
      }

      .detail-log-entry .dle-action {
        color: var(--fg);
      }

      /* ── Connection status ── */
      #connection {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red);
        flex-shrink: 0;
      }

      #connection.connected {
        background: var(--fg);
      }

      /* ── Start overlay ── */
      #start-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
      }

      #start-overlay.hidden {
        display: none;
      }

      #start-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      #start-title {
        font-size: 13px;
        color: var(--fg-dim);
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      #mode-picker {
        display: flex;
        gap: 24px;
      }

      .mode-btn {
        background: transparent;
        border: 2px solid var(--border);
        color: var(--fg-dim);
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        padding: 24px 36px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-align: center;
        min-width: 220px;
        transition: border-color 0.15s, color 0.15s;
      }

      .mode-btn .mode-label {
        display: block;
        font-size: 16px;
        margin-bottom: 8px;
      }

      .mode-btn .mode-sub {
        display: block;
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 1px;
        opacity: 0.6;
      }

      .mode-btn.selected {
        border-color: var(--fg);
        color: var(--fg);
      }

      .mode-btn:disabled {
        cursor: default;
        opacity: 0.3;
      }

      #start-btn {
        background: transparent;
        border: 2px solid var(--fg);
        color: var(--fg);
        font-family: inherit;
        font-size: 18px;
        font-weight: 700;
        padding: 16px 48px;
        cursor: pointer;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: background 0.15s, color 0.15s;
      }

      #start-btn:disabled {
        border-color: var(--fg-dim);
        color: var(--fg-dim);
        cursor: default;
      }

      /* ── Team colors ── */
      .tc0 {
        color: #00ffff;
      }
      .tc1 {
        color: #ff00ff;
      }
      .tc2 {
        color: #ffff00;
      }
      .tc3 {
        color: #00ff00;
      }
      .tc4 {
        color: #ff4444;
      }
      .tc5 {
        color: #4488ff;
      }
      .tc6 {
        color: #cccccc;
      }
      .tc7 {
        color: #888888;
      }
      .tc8 {
        color: #66ffff;
      }
      .tc9 {
        color: #ff66ff;
      }
      .tc10 {
        color: #ffff66;
      }
      .tc11 {
        color: #66ff66;
      }
      .tc12 {
        color: #ff8888;
      }
      .tc13 {
        color: #88aaff;
      }
      .tc14 {
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="header">
        <div id="connection"></div>
        <h1>AGI HOUSE</h1>
        <input id="search-box" type="text" placeholder="Search participants..." autocomplete="off" />
        <div id="progress"></div>
        <div id="status-bar">
          <span class="tick" id="st-tick">--/--</span>
          <span id="st-time">--:--</span>
          <span class="phase" id="st-phase">---</span>
          <span id="st-counts">T:0 S:0 P:0</span>
        </div>
      </div>

      <div id="floor-plan"></div>

      <div id="sidebar">
        <div id="search-results"></div>
        <div id="detail-panel">
          <div class="empty-detail">Click a participant or search to inspect</div>
        </div>
      </div>

      <div id="log-panel"></div>
    </div>

    <div id="start-overlay">
      <div id="start-inner">
        <div id="start-title">select mode</div>
        <div id="mode-picker">
          <button class="mode-btn" data-mode="real" disabled>
            <span class="mode-label">Real</span>
            <span class="mode-sub">as it happened</span>
          </button>
          <button class="mode-btn" data-mode="freak" disabled>
            <span class="mode-label">Unhinged</span>
            <span class="mode-sub">unhinged retelling</span>
          </button>
        </div>
        <button id="start-btn" disabled>Select a mode</button>
      </div>
    </div>

    <script>
      const TEAM_COLORS = Array.from({ length: 15 }, (_, i) => `tc${i}`);
      const teamColorMap = {};
      let teamColorIdx = 0;

      function getTeamColorClass(teamId) {
        if (!teamColorMap[teamId]) {
          teamColorMap[teamId] = TEAM_COLORS[teamColorIdx % TEAM_COLORS.length];
          teamColorIdx++;
        }
        return teamColorMap[teamId];
      }

      function getInitials(name) {
        const parts = name.split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        return name.slice(0, 2).toUpperCase();
      }

      const ISO = {
        width: 960,
        height: 620,
        originX: 468,
        originY: 84,
        cellX: 18,
        cellY: 10,
        wallHeight: 5,
        wallScale: 20,
      };

      const ROOM_LAYOUT = [
        { key: "KITCHEN", label: "KITCHEN", x: 0, y: 0, w: 11, h: 5, panelInset: 12 },
        { key: "BAR", label: "BAR", x: 11, y: 0, w: 6, h: 6, panelInset: 10 },
        { key: "OFFICE", label: "OFFICE", x: 17, y: 0, w: 9, h: 7, panelInset: 12 },
        { key: "MAIN_ROOM", label: "MAIN HALL", x: 0, y: 5, w: 14, h: 8, panelInset: 12 },
        { key: "STAIRS", label: "STAIRS / 2F", x: 14, y: 6, w: 4, h: 7, mergeKeys: ["STAIRS", "SECOND_FLOOR"], panelInset: 8 },
        { key: "BATHROOM", label: "BATH+STOR", x: 18, y: 7, w: 8, h: 4, mergeKeys: ["BATHROOM", "STORAGE"], panelInset: 9 },
        { key: "FRONT_GARDEN", label: "FRONT GARDEN", x: 0, y: 13, w: 11, h: 5, panelInset: 12 },
        { key: "BACK_GARDEN", label: "GARDEN", x: 11, y: 11, w: 15, h: 7, panelInset: 12 },
      ];

      let state = null;
      let selectedParticipantId = null;
      let searchQuery = "";
      let simStarted = false;
      let selectedMode = null;

      // ── WebSocket ──

      let ws;
      let reconnectTimer;
      let wsReady = false;
      const startBtn = document.getElementById("start-btn");
      const startOverlay = document.getElementById("start-overlay");
      const modeBtns = document.querySelectorAll(".mode-btn");

      function updateStartBtn() {
        if (!wsReady) {
          startBtn.disabled = true;
          startBtn.textContent = "Connecting...";
          modeBtns.forEach((b) => (b.disabled = true));
        } else if (!selectedMode) {
          startBtn.disabled = true;
          startBtn.textContent = "Select a mode";
          modeBtns.forEach((b) => (b.disabled = false));
        } else {
          startBtn.disabled = false;
          startBtn.textContent = "Start Simulation";
          modeBtns.forEach((b) => (b.disabled = false));
        }
      }

      modeBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedMode = btn.dataset.mode;
          modeBtns.forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
          updateStartBtn();
        });
      });

      function connect() {
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${protocol}://${location.host}`);

        ws.onopen = () => {
          document.getElementById("connection").classList.add("connected");
          wsReady = true;
          if (!simStarted) updateStartBtn();
        };

        ws.onclose = () => {
          document.getElementById("connection").classList.remove("connected");
          wsReady = false;
          if (!simStarted) updateStartBtn();
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 2000);
        };

        ws.onmessage = (evt) => {
          const msg = JSON.parse(evt.data);
          const progressEl = document.getElementById("progress");
          if (msg.type === "progress") {
            progressEl.textContent = "⟳ " + msg.message;
            progressEl.classList.add("active");
            return;
          }
          progressEl.textContent = "";
          progressEl.classList.remove("active");
          state = msg;
          render();
        };
      }

      startBtn.addEventListener("click", () => {
        if (ws && ws.readyState === WebSocket.OPEN && selectedMode) {
          ws.send(JSON.stringify({ cmd: "start" }));
          simStarted = true;
          startOverlay.classList.add("hidden");
        }
      });

      connect();

      // ── Rendering ──

      function render() {
        if (!state) return;
        renderStatusBar();
        renderFloorPlan();
        renderLogPanel();
        renderSearchResults();
        if (selectedParticipantId) renderDetail(selectedParticipantId);
      }

      function renderStatusBar() {
        document.getElementById("st-tick").textContent = `${state.tick}/${state.totalTicks}`;
        document.getElementById("st-time").textContent = state.time;
        document.getElementById("st-phase").textContent = state.phase;
        const teams = state.teams.length;
        const solos = state.participants.filter((p) => !p.team_id).length;
        document.getElementById("st-counts").textContent = `T:${teams} S:${solos} P:${state.participants.length}`;
      }

      function renderFloorPlan() {
        const container = document.getElementById("floor-plan");
        container.innerHTML = "";
        const scene = document.createElement("div");
        scene.className = "iso-scene";

        scene.appendChild(buildIsoGrid());
        scene.appendChild(buildParticipantLayer());

        const overlay = document.createElement("div");
        overlay.className = "iso-overlay";

        for (const roomDef of ROOM_LAYOUT) {
          const roomKeys = roomDef.mergeKeys || [roomDef.key];
          const participants = state.participants.filter((p) => roomKeys.includes(p.room));
          overlay.appendChild(buildRoomPanel(roomDef, participants));
        }

        scene.appendChild(overlay);
        container.appendChild(scene);
      }

      function isoProject(x, y, z = 0) {
        return {
          x: ISO.originX + (x - y) * ISO.cellX,
          y: ISO.originY + (x + y) * ISO.cellY - z * ISO.wallScale,
        };
      }

      function topFacePoints(roomDef) {
        return [
          isoProject(roomDef.x, roomDef.y, ISO.wallHeight),
          isoProject(roomDef.x + roomDef.w, roomDef.y, ISO.wallHeight),
          isoProject(roomDef.x + roomDef.w, roomDef.y + roomDef.h, ISO.wallHeight),
          isoProject(roomDef.x, roomDef.y + roomDef.h, ISO.wallHeight),
        ];
      }

      function pointsToPath(points) {
        return points.map((p, idx) => `${idx === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ") + " Z";
      }

      function linePath(a, b) {
        return `M ${a.x} ${a.y} L ${b.x} ${b.y}`;
      }

      function buildIsoGrid() {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.classList.add("iso-grid");
        svg.setAttribute("viewBox", `0 0 ${ISO.width} ${ISO.height}`);
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        const house = { x: 0, y: 0, w: 26, h: 18 };
        const floor = [
          isoProject(house.x, house.y, 0),
          isoProject(house.x + house.w, house.y, 0),
          isoProject(house.x + house.w, house.y + house.h, 0),
          isoProject(house.x, house.y + house.h, 0),
        ];
        const rim = [
          isoProject(house.x, house.y, ISO.wallHeight),
          isoProject(house.x + house.w, house.y, ISO.wallHeight),
          isoProject(house.x + house.w, house.y + house.h, ISO.wallHeight),
          isoProject(house.x, house.y + house.h, ISO.wallHeight),
        ];

        const floorFace = document.createElementNS(svgNS, "path");
        floorFace.setAttribute("d", pointsToPath(floor));
        floorFace.setAttribute("class", "face");
        svg.appendChild(floorFace);

        for (const roomDef of ROOM_LAYOUT) {
          const face = document.createElementNS(svgNS, "path");
          face.setAttribute("d", pointsToPath(topFacePoints(roomDef)));
          face.setAttribute("class", "face");
          svg.appendChild(face);
        }

        const outerTop = document.createElementNS(svgNS, "path");
        outerTop.setAttribute("d", pointsToPath(rim));
        outerTop.setAttribute("class", "wire");
        svg.appendChild(outerTop);

        const outerBottom = document.createElementNS(svgNS, "path");
        outerBottom.setAttribute("d", pointsToPath(floor));
        outerBottom.setAttribute("class", "wire dim");
        svg.appendChild(outerBottom);

        for (let i = 0; i < rim.length; i++) {
          const edge = document.createElementNS(svgNS, "path");
          edge.setAttribute("d", linePath(rim[i], floor[i]));
          edge.setAttribute("class", "wire");
          svg.appendChild(edge);
        }

        for (const roomDef of ROOM_LAYOUT) {
          const top = topFacePoints(roomDef);
          const floorCorners = [
            isoProject(roomDef.x, roomDef.y, 0),
            isoProject(roomDef.x + roomDef.w, roomDef.y, 0),
            isoProject(roomDef.x + roomDef.w, roomDef.y + roomDef.h, 0),
            isoProject(roomDef.x, roomDef.y + roomDef.h, 0),
          ];

          const topPath = document.createElementNS(svgNS, "path");
          topPath.setAttribute("d", pointsToPath(top));
          topPath.setAttribute("class", "wire");
          svg.appendChild(topPath);

          for (let i = 0; i < top.length; i++) {
            const column = document.createElementNS(svgNS, "path");
            column.setAttribute("d", linePath(top[i], floorCorners[i]));
            column.setAttribute("class", "wire");
            svg.appendChild(column);
          }
        }

        return svg;
      }

      function buildParticipantLayer() {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.classList.add("iso-people");
        svg.setAttribute("viewBox", `0 0 ${ISO.width} ${ISO.height}`);
        svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

        const placements = [];
        for (const roomDef of ROOM_LAYOUT) {
          const roomKeys = roomDef.mergeKeys || [roomDef.key];
          const participants = state.participants
            .filter((p) => roomKeys.includes(p.room))
            .slice()
            .sort((a, b) => a.name.localeCompare(b.name));
          const anchors = getRoomAnchors(roomDef, participants.length);

          for (let i = 0; i < participants.length; i++) {
            const anchor = anchors[i];
            if (!anchor) continue;
            const participant = participants[i];
            const ground = isoProject(anchor.x, anchor.y, 0);
            placements.push({ participant, ground, scale: anchor.scale });
          }
        }

        placements.sort((a, b) => a.ground.y - b.ground.y);

        for (const placement of placements) {
          svg.appendChild(buildParticipantGlyph(placement.participant, placement));
        }

        return svg;
      }

      function getRoomAnchors(roomDef, count) {
        if (count === 0) return [];

        const padX = Math.min(1.2, Math.max(0.55, roomDef.w * 0.12));
        const padY = Math.min(1.1, Math.max(0.55, roomDef.h * 0.14));
        const width = Math.max(0.8, roomDef.w - padX * 2);
        const height = Math.max(0.8, roomDef.h - padY * 2);
        const cols = Math.max(1, Math.ceil(Math.sqrt((count * width) / height)));
        const rows = Math.max(1, Math.ceil(count / cols));
        const cellW = width / cols;
        const cellH = height / rows;
        const anchors = [];
        const baseScale = Math.max(0.34, Math.min(0.82, Math.min(cellW * 0.72, cellH * 1.08)));

        for (let i = 0; i < count; i++) {
          const row = Math.floor(i / cols);
          const col = i % cols;
          const stagger = row % 2 === 0 ? 0 : Math.min(cellW * 0.22, 0.28);
          const driftX = ((i * 37) % 9) * 0.018 - 0.07;
          const driftY = ((i * 53) % 9) * 0.016 - 0.06;
          const x = Math.min(roomDef.x + roomDef.w - padX * 0.6, roomDef.x + padX + cellW * (col + 0.5) + stagger + driftX);
          const y = Math.min(roomDef.y + roomDef.h - padY * 0.75, roomDef.y + padY + cellH * (row + 0.55) + driftY);
          anchors.push({ x, y, scale: baseScale });
        }

        return anchors;
      }

      function buildParticipantGlyph(participant, placement) {
        const svgNS = "http://www.w3.org/2000/svg";
        const g = document.createElementNS(svgNS, "g");
        const colorClass = participant.team_id ? getTeamColorClass(participant.team_id) : "solo";
        const scale = placement.scale || 1;

        g.setAttribute("transform", `translate(${placement.ground.x} ${placement.ground.y}) scale(${scale})`);
        g.setAttribute("class", `iso-person ${colorClass}`);
        g.dataset.pid = participant.id;

        if (participant.id === selectedParticipantId) {
          g.classList.add("selected");
        }

        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          if (participant.name.toLowerCase().includes(q)) {
            g.classList.add("highlight");
          }
        }

        const title = document.createElementNS(svgNS, "title");
        title.textContent = participant.name;
        g.appendChild(title);

        const ring = document.createElementNS(svgNS, "ellipse");
        ring.setAttribute("class", "person-ring");
        ring.setAttribute("cx", "0");
        ring.setAttribute("cy", "0");
        ring.setAttribute("rx", "7");
        ring.setAttribute("ry", "3.6");
        g.appendChild(ring);

        const shadow = document.createElementNS(svgNS, "ellipse");
        shadow.setAttribute("class", "person-shadow");
        shadow.setAttribute("cx", "0");
        shadow.setAttribute("cy", "1.2");
        shadow.setAttribute("rx", "4.8");
        shadow.setAttribute("ry", "2.5");
        g.appendChild(shadow);

        const body = document.createElementNS(svgNS, "path");
        body.setAttribute("class", "person-body");
        body.setAttribute("d", "M -2.6 -2.2 L 0 -4.4 L 2.6 -2.2 L 2.1 -10.4 L 0 -13.2 L -2.1 -10.4 Z");
        g.appendChild(body);

        const head = document.createElementNS(svgNS, "circle");
        head.setAttribute("class", "person-head");
        head.setAttribute("cx", "0");
        head.setAttribute("cy", "-16.3");
        head.setAttribute("r", "2.7");
        g.appendChild(head);

        const arms = document.createElementNS(svgNS, "path");
        arms.setAttribute("class", "person-limb");
        arms.setAttribute("d", "M -4.1 -8.6 L 0 -10.1 L 4.1 -8.6");
        g.appendChild(arms);

        const legs = document.createElementNS(svgNS, "path");
        legs.setAttribute("class", "person-limb");
        legs.setAttribute("d", "M -1.2 -2.4 L -2.8 1.8 M 1.2 -2.4 L 2.8 1.8");
        g.appendChild(legs);

        g.addEventListener("click", () => selectParticipant(participant.id));
        return g;
      }

      function buildRoomPanel(roomDef, participants) {
        const panel = document.createElement("div");
        panel.className = "iso-room-panel";

        const top = topFacePoints(roomDef);
        const xs = top.map((p) => p.x);
        const ys = top.map((p) => p.y);
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);
        const inset = roomDef.panelInset || 10;

        panel.style.left = `${minX + inset}px`;
        panel.style.top = `${minY + inset}px`;
        panel.style.width = `${Math.min(128, Math.max(76, maxX - minX - inset * 2))}px`;

        const head = document.createElement("div");
        head.className = "iso-room-head";

        const name = document.createElement("div");
        name.className = "iso-room-name";
        name.textContent = roomDef.label;
        head.appendChild(name);

        const count = document.createElement("div");
        count.className = "iso-room-count";
        count.textContent = `${participants.length}`;
        head.appendChild(count);

        panel.appendChild(head);
        return panel;
      }

      function makeInitialSpan(participant, colorClass) {
        const span = document.createElement("span");
        span.className = `initials ${colorClass}`;
        span.textContent = getInitials(participant.name);
        span.dataset.pid = participant.id;
        span.title = participant.name;

        if (participant.id === selectedParticipantId) {
          span.classList.add("selected");
        }

        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          if (participant.name.toLowerCase().includes(q)) {
            span.classList.add("highlight");
          }
        }

        span.addEventListener("click", () => selectParticipant(participant.id));
        return span;
      }

      function renderLogPanel() {
        const panel = document.getElementById("log-panel");
        panel.innerHTML = "";

        const logs = state.recentLogs.slice(-12);
        if (logs.length === 0) {
          const d = document.createElement("div");
          d.className = "log-entry";
          d.style.color = "var(--fg-dim)";
          d.textContent = "Waiting for first actions...";
          panel.appendChild(d);
          return;
        }

        for (const entry of logs) {
          const d = document.createElement("div");
          d.className = "log-entry";

          const cc = entry.teamId ? getTeamColorClass(entry.teamId) : "";
          const nameSpan = document.createElement("span");
          nameSpan.className = cc;
          nameSpan.textContent = entry.name;

          const tag = document.createElement("span");
          tag.className = "log-tag";
          tag.textContent = ` [${entry.actionType}]`;

          d.appendChild(nameSpan);
          d.appendChild(document.createTextNode(": " + entry.action.slice(0, 80) + "  "));
          d.appendChild(tag);
          panel.appendChild(d);
        }

        panel.scrollTop = panel.scrollHeight;
      }

      // ── Search ──

      const searchBox = document.getElementById("search-box");
      searchBox.addEventListener("input", (e) => {
        searchQuery = e.target.value;
        renderSearchResults();
        renderFloorPlan();
      });

      function renderSearchResults() {
        const container = document.getElementById("search-results");
        if (!state || !searchQuery) {
          container.classList.remove("visible");
          container.innerHTML = "";
          return;
        }

        const q = searchQuery.toLowerCase();
        const matches = state.participants.filter((p) => p.name.toLowerCase().includes(q));

        if (matches.length === 0) {
          container.classList.remove("visible");
          container.innerHTML = "";
          return;
        }

        container.classList.add("visible");
        container.innerHTML = "";

        for (const p of matches.slice(0, 20)) {
          const item = document.createElement("div");
          item.className = "search-item";

          const team = p.team_id ? state.teams.find((t) => t.id === p.team_id) : null;
          const cc = p.team_id ? getTeamColorClass(p.team_id) : "";
          item.innerHTML = `<span class="${cc}">${esc(p.name)}</span> <span class="si-room">${p.room}${
            team ? " · " + esc(team.name) : " · solo"
          }</span>`;
          item.addEventListener("click", () => selectParticipant(p.id));
          container.appendChild(item);
        }
      }

      // ── Detail panel ──

      function selectParticipant(id) {
        selectedParticipantId = id;
        renderDetail(id);
        renderFloorPlan();
      }

      function renderDetail(id) {
        const panel = document.getElementById("detail-panel");
        if (!state) return;

        const p = state.participants.find((x) => x.id === id);
        if (!p) {
          panel.innerHTML = '<div class="empty-detail">Participant not found</div>';
          return;
        }

        const team = p.team_id ? state.teams.find((t) => t.id === p.team_id) : null;
        const cc = p.team_id ? getTeamColorClass(p.team_id) : "";

        const recentActions = state.recentLogs.filter((l) => l.name === p.name).slice(-8);

        panel.innerHTML = `
    <h2>${esc(p.name)}</h2>

    <div class="detail-section">
      <label>IDENTITY</label>
      <div class="value">${esc(p.identity_md)}</div>
    </div>

    <div class="detail-section">
      <label>GOAL</label>
      <div class="value">${esc(p.goal)}</div>
    </div>

    <div class="detail-section">
      <label>LOCATION</label>
      <div class="value">${p.room.replace(/_/g, " ")}</div>
    </div>

    <div class="detail-section">
      <label>TEAM</label>
      <div class="value ${cc}">${team ? esc(team.name) + ' — "' + esc(team.project_name) + '"' : "Solo"}</div>
    </div>

    <div class="detail-section">
      <label>STATS</label>
      ${statBar("E", p.stats.energy, "stat-energy")}
      ${statBar("M", p.stats.momentum, "stat-momentum")}
      ${statBar("Mo", p.stats.morale, "stat-morale")}
    </div>

    <div class="detail-section">
      <label>KNOWLEDGE</label>
      <div class="value" style="font-size:11px">${
        p.world_knowledge.length > 0
          ? p.world_knowledge
              .slice(-5)
              .map((k) => "· " + esc(k))
              .join("<br>")
          : '<span style="color:var(--fg-dim)">None yet</span>'
      }</div>
    </div>

    <div class="detail-section">
      <label>RECENT ACTIONS</label>
      <div class="detail-log">
        ${
          recentActions.length > 0
            ? recentActions
                .map((a) => `<div class="detail-log-entry"><span class="dle-action">[${esc(a.actionType)}]</span> ${esc(a.action)}</div>`)
                .join("")
            : '<div style="color:var(--fg-dim)">No recent actions</div>'
        }
      </div>
    </div>
  `;
      }

      function statBar(label, value, cls) {
        return `<div class="stat-bar ${cls}">
    <span class="stat-label">${label}</span>
    <div class="stat-track"><div class="stat-fill" style="width:${value}%"></div></div>
    <span class="stat-val">${value}</span>
  </div>`;
      }

      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }
    </script>
  </body>
</html>
